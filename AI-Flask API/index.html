<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 اختبار API الكشف عن الحشرات والنبات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5em;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .upload-area:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8eaf6;
            border-color: #764ba2;
        }

        .upload-area input {
            display: none;
        }

        .upload-area p {
            color: #666;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            width: 100%;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .preview {
            margin-top: 15px;
            display: none;
        }

        .preview img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            background: #f0f4ff;
        }

        .result.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }

        .result.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .result-item {
            margin: 8px 0;
            font-size: 1.1em;
        }

        .result-label {
            font-weight: bold;
            color: #555;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .status.online {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.offline {
            background: #ffebee;
            color: #c62828;
        }

        @media (max-width: 768px) {
            .cards {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }
        }

        .emoji {
            font-size: 1.3em;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🌐 اختبار API الكشف عن الحشرات والنبات</h1>

        <div id="status" class="status offline">
            ⏳ جاري الاتصال...
        </div>

        <div class="cards">
            <!-- Insect Detection Card -->
            <div class="card">
                <h2>
                    <span class="emoji">🐛</span>
                    كشف الحشرات
                </h2>

                <div class="upload-area" id="insect-upload">
                    <p>انقر هنا أو اسحب صورة</p>
                    <input type="file" id="insect-file" accept="image/*">
                </div>

                <div class="preview" id="insect-preview">
                    <img id="insect-preview-img" alt="صورة معاينة">
                </div>

                <button onclick="detectInsect()" id="insect-btn">
                    كشف الحشرة
                </button>

                <div class="loading" id="insect-loading">
                    <div class="spinner"></div>
                </div>

                <div class="result" id="insect-result"></div>
            </div>

            <!-- Plant Detection Card -->
            <div class="card">
                <h2>
                    <span class="emoji">🌱</span>
                    كشف النبات
                </h2>

                <div class="upload-area" id="plant-upload">
                    <p>انقر هنا أو اسحب صورة</p>
                    <input type="file" id="plant-file" accept="image/*">
                </div>

                <div class="preview" id="plant-preview">
                    <img id="plant-preview-img" alt="صورة معاينة">
                </div>

                <button onclick="detectPlant()" id="plant-btn">
                    كشف النبات
                </button>

                <div class="loading" id="plant-loading">
                    <div class="spinner"></div>
                </div>

                <div class="result" id="plant-result"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5000';

        // Check API health
        function checkStatus() {
            fetch(`${API_URL}/api/health`)
                .then(r => r.json())
                .then(data => {
                    const status = document.getElementById('status');
                    status.className = 'status online';
                    status.textContent = '✅ API متصل وجاهز';
                })
                .catch(e => {
                    const status = document.getElementById('status');
                    status.className = 'status offline';
                    status.textContent = '❌ API غير متصل - تأكد من تشغيل python app.py';
                });
        }

        // Setup file uploads with drag & drop
        function setupUploadArea(uploadId, fileInputId, previewId) {
            const uploadArea = document.getElementById(uploadId);
            const fileInput = document.getElementById(fileInputId);
            const preview = document.getElementById(previewId);
            const previewImg = preview.querySelector('img');

            uploadArea.addEventListener('click', () => fileInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                fileInput.files = e.dataTransfer.files;
                showPreview(fileInput, previewImg, preview);
            });

            fileInput.addEventListener('change', () => {
                showPreview(fileInput, previewImg, preview);
            });
        }

        function showPreview(fileInput, previewImg, preview) {
            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        async function detectInsect() {
            await detect('insect');
        }

        async function detectPlant() {
            await detect('plant');
        }

        async function detect(type) {
            const fileInputId = `${type}-file`;
            const resultId = `${type}-result`;
            const loadingId = `${type}-loading`;
            const btnId = `${type}-btn`;

            const fileInput = document.getElementById(fileInputId);
            const result = document.getElementById(resultId);
            const loading = document.getElementById(loadingId);
            const btn = document.getElementById(btnId);

            if (!fileInput.files || fileInput.files.length === 0) {
                showResult(resultId, 'error', '❌ اختر صورة أولاً');
                return;
            }

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            loading.style.display = 'block';
            btn.disabled = true;
            result.style.display = 'none';

            try {
                const endpoint = type === 'insect'
                    ? '/api/detect/insect'
                    : '/api/detect/plant';

                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    const html = `
                        <div class="result-item">
                            <span class="result-label">🎯 المكتشف:</span> ${data.detected}
                        </div>
                        <div class="result-item">
                            <span class="result-label">📊 النوع:</span> ${data.type}
                        </div>
                        <div class="result-item">
                            <span class="result-label">⚠️  الخطورة:</span> ${data.is_harmful ? '❌ ضار' : '✅ غير ضار'}
                        </div>
                        <div class="result-item">
                            <span class="result-label">📈 الثقة:</span> ${data.confidence_pct}%
                        </div>
                    `;
                    showResult(resultId, 'success', html);
                } else {
                    showResult(resultId, 'error', `❌ خطأ: ${data.error}`);
                }
            } catch (error) {
                showResult(resultId, 'error', `❌ خطأ في الاتصال: ${error.message}`);
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }

        function showResult(resultId, className, content) {
            const result = document.getElementById(resultId);
            result.className = `result ${className}`;
            result.innerHTML = content;
            result.style.display = 'block';
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            checkStatus();
            setInterval(checkStatus, 5000); // Check every 5 seconds

            setupUploadArea('insect-upload', 'insect-file', 'insect-preview');
            setupUploadArea('plant-upload', 'plant-file', 'plant-preview');
        });
    </script>
</body>

</html>
